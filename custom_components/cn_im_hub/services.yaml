send_message:
  name: Send Message
  description: Send a message via selected IM provider.
  fields:
    channel:
      required: true
      example: feishu/chat_id
      selector:
        select:
          options:
            - label: Feishu / chat_id
              value: feishu/chat_id
            - label: WeCom / chatid
              value: wecom/chatid
            - label: QQ / user
              value: qq/user
            - label: QQ / group
              value: qq/group
            - label: QQ / channel
              value: qq/channel
            - label: DingTalk / user
              value: dingtalk/user
            - label: DingTalk / group
              value: dingtalk/group
            - label: WeChat / user_id
              value: wechat/user_id
    target:
      required: false
      selector:
        text:
    wechat_account_id:
      required: false
      description: Required when using WeChat channel with multiple bound WeChat accounts.
      selector:
        text:
    use_selected_target:
      required: false
      default: true
      selector:
        boolean:
    message:
      required: false
      selector:
        text:
    camera_entity:
      required: false
      description: Camera entity to capture and send as an image. Currently supported by WeChat and WeCom.
      selector:
        entity:
          filter:
            domain: camera
