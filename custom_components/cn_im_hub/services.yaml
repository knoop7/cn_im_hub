send_message:
  name: Send Message
  description: Send a message via selected IM provider.
  fields:
    channel:
      required: true
      example: feishu/chat_id
      selector:
        select:
          options:
            - label: Feishu / chat_id
              value: feishu/chat_id
            - label: WeCom / chatid
              value: wecom/chatid
            - label: QQ / user
              value: qq/user
            - label: QQ / group
              value: qq/group
            - label: QQ / channel
              value: qq/channel
            - label: DingTalk / user
              value: dingtalk/user
            - label: DingTalk / group
              value: dingtalk/group
            - label: WeChat / user_id
              value: wechat/user_id
    target:
      required: false
      description: Optional. If omitted, the service will use the currently selected target from the matching provider selector. When multiple same-type provider instances exist, a filled target also helps route to the correct instance.
      selector:
        text:
    wechat_account_id:
      required: false
      description: Required when using WeChat channel with multiple bound WeChat accounts. Use the WeChat subentry title suffix or the full title.
      example: "WeChat (abc123@im.bot)"
      selector:
        text:
    message:
      required: false
      selector:
        text:
    tts_text:
      required: false
      description: Text to synthesize and send as voice when the provider supports TTS media sending.
      selector:
        text:
    camera_entity:
      required: false
      description: Camera entity to capture and send as an image. Currently supported by WeChat, WeCom, Feishu, QQ, and DingTalk.
      selector:
        entity:
          filter:
            domain: camera
    file_path:
      required: false
      description: Absolute local file path to send as media. Media type can be inferred from extension or overridden by media_type.
      selector:
        text:
    file_url:
      required: false
      description: Remote URL to download and send as media. Media type can be inferred from extension or overridden by media_type.
      selector:
        text:
    file_name:
      required: false
      description: Optional outbound filename override for file media.
      selector:
        text:
    media_type:
      required: false
      description: Optional media type override for file_path or file_url.
      selector:
        select:
          options:
            - label: Infer automatically
              value: ""
            - label: Image
              value: image
            - label: GIF
              value: gif
            - label: Voice
              value: voice
            - label: Video
              value: video
            - label: File
              value: file
    message_format:
      required: false
      description: Optional outbound text format override. Currently QQ supports auto, text, and markdown.
      selector:
        select:
          options:
            - label: Auto
              value: auto
            - label: Plain text
              value: text
            - label: Markdown
              value: markdown
    approval_id:
      required: false
      description: When set, send the message as a QQ approval prompt with inline allow/deny buttons.
      selector:
        text:
    record_duration:
      required: false
      description: When camera_entity is used for video or GIF capture, planned recording/capture duration in seconds. GIF defaults to 3 seconds when omitted.
      selector:
        number:
          min: 1
          max: 60
          unit_of_measurement: seconds
    lookback:
      required: false
      description: Optional lookback seconds to include before camera video recording starts. Only applies to video capture.
      selector:
        number:
          min: 0
          max: 30
          unit_of_measurement: seconds
    gif_fps:
      required: false
      description: Frames per second when generating an animated GIF from camera snapshots.
      selector:
        number:
          min: 1
          max: 10
