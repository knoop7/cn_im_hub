name: Release

on:
  push:
    branches:
      - main
    paths:
      - custom_components/cn_im_hub/manifest.json
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from manifest
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import json
          from pathlib import Path
          manifest = json.loads(Path('custom_components/cn_im_hub/manifest.json').read_text(encoding='utf-8'))
          print(manifest['version'])
          PY
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Check if tag exists
        id: tag_check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Load release notes
        id: notes
        run: |
          {
            echo 'body<<EOF'
            cat .github/release-notes.md
            echo EOF
          } >> "$GITHUB_OUTPUT"

      - name: Build HACS release archive
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          cd custom_components/cn_im_hub
          zip -r "$GITHUB_WORKSPACE/cn_im_hub.zip" ./ -x "*.pyc" -x "*/__pycache__/*"

      - name: Create GitHub release with asset
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          files: cn_im_hub.zip
          make_latest: true
